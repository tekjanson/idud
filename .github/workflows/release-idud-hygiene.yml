name: Build idud-hygiene release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'idud-hygiene-v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: idud-hygiene-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: idud-hygiene-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: idud-hygiene-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release -p idud-hygiene --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/idud-hygiene.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/idud-hygiene dist/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
