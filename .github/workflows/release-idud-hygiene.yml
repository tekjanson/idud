name: Release idud-hygiene

on:
  workflow_dispatch:
  push:
    tags:
      - 'idud-hygiene-v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: idud-hygiene-linux-x86_64.tar.gz
            binary_path: target/x86_64-unknown-linux-gnu/release/idud-hygiene
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: idud-hygiene-macos-x86_64.tar.gz
            binary_path: target/x86_64-apple-darwin/release/idud-hygiene
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: idud-hygiene-windows-x86_64.zip
            binary_path: target/x86_64-pc-windows-msvc/release/idud-hygiene.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release -p idud-hygiene --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "${{ matrix.binary_path }}" dist/idud-hygiene.exe
            (cd dist && 7z a ../${{ matrix.archive_name }} idud-hygiene.exe > /dev/null)
          else
            cp "${{ matrix.binary_path }}" dist/idud-hygiene
            chmod +x dist/idud-hygiene
            tar -czf "${{ matrix.archive_name }}" -C dist idud-hygiene
          fi
          sha256sum "${{ matrix.archive_name }}" > "${{ matrix.archive_name }}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
